<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
.box { position: relative; width: 300px; }
.btn { position: absolute; top: 0; right: 5px; cursor: pointer; }
</style>
</head>
<body>

<div class="box">
  <span class="btn">X</span>
  <img src="lilium.jpeg" width="300">
</div>

<script>
$('.btn').click(function(){
  $('.box').hide();
});
</script>

</body>
</html>
